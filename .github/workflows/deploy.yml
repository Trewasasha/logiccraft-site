name: Deploy LogicCraft Site

on:
  push:
    branches:
      - main  # Скрипт сработает, когда ты сделаешь git push в ветку main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "./*"
          target: "/root/logiccraft/"

      - name: Execute remote SSH commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /root/logiccraft
            
            # Автоматически выставляем права на чтение для EXE (чтобы не было ошибки "недоступен")
            if [ -d "html" ]; then
              chmod -R 755 html/
              find html/ -type f -name "*.exe" -exec chmod 644 {} \;
            fi
            
            # Перезапускаем Docker-контейнер
            docker stop logiccraft-app || true
            docker rm logiccraft-app || true
            docker build --no-cache -t logiccraft-site .
            docker run -d -p 80:80 --name logiccraft-app --restart always logiccraft-site